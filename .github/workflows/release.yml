name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Derivar versão da tag
        id: ver
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          "version=$ver" >> $env:GITHUB_OUTPUT
          Write-Host "Versão: $ver"

      - name: Publish GUI (single-file, self-contained, win-x64)
        shell: pwsh
        run: |
          dotnet publish source/Memo/Memo.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtraction=true `
            -p:Version=${{ steps.ver.outputs.version }} `
            -o publish

      - name: Publish CLI (single-file, self-contained, win-x64)
        shell: pwsh
        run: |
          dotnet publish source/Memo.Cli/Memo.Cli.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtraction=true `
            -p:Version=${{ steps.ver.outputs.version }} `
            -o publish

      - name: Assinar executável (certificado auto-assinado)
        shell: pwsh
        env:
          PFX_BASE64: ${{ secrets.SIGN_PFX_BASE64 }}
          PFX_PASSWORD: ${{ secrets.SIGN_PFX_PASSWORD }}
        if: env.PFX_BASE64 != ''
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP "memo.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:PFX_BASE64))

          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe `
            | Where-Object { $_.FullName -like '*x64*' } `
            | Select-Object -First 1 -ExpandProperty FullName

          & $signtool sign /f $pfxPath /p $env:PFX_PASSWORD `
            /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 `
            "publish/Memo.exe" "publish/memo-cli.exe"

          Remove-Item $pfxPath -Force

      - name: Gerar manifesto e checksum
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.version }}"
          $hash = (Get-FileHash "publish/Memo.exe" -Algorithm SHA256).Hash.ToLower()
          "$hash  Memo.exe" | Out-File -Encoding ascii "publish/Memo.exe.sha256"

          $hashCli = (Get-FileHash "publish/memo-cli.exe" -Algorithm SHA256).Hash.ToLower()
          "$hashCli  memo-cli.exe" | Out-File -Encoding ascii "publish/memo-cli.exe.sha256"

          $url = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Memo.exe"
          $manifest = [ordered]@{ version = $ver; url = $url; sha256 = $hash }
          $manifest | ConvertTo-Json | Out-File -Encoding utf8 "publish/latest.json"

          Write-Host "SHA256 GUI: $hash"
          Write-Host "SHA256 CLI: $hashCli"

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Memo ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            publish/Memo.exe
            publish/Memo.exe.sha256
            publish/memo-cli.exe
            publish/memo-cli.exe.sha256
            publish/latest.json
