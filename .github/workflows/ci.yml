name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # Build pelo .csproj (o app referencia o Memo.Service). Evita o formato
      # .slnx, que o SDK 8.0.x não suporta.
      - name: Restore
        run: dotnet restore source/Memo/Memo.csproj

      - name: Build
        run: dotnet build source/Memo/Memo.csproj -c Release --no-restore
